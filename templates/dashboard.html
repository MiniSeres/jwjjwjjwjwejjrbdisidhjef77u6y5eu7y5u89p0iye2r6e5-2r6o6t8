<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Bot Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
  <style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}
.container{display:flex;width:100%;height:100vh}
.sidebar{width:240px;background:#12121a;padding:20px;border-right:1px solid #2a2a3a;display:flex;flex-direction:column}
.logo{font-size:24px;font-weight:bold;color:#00d4ff;padding:10px 0 30px;display:flex;align-items:center;gap:10px}
.stats-box{background:#1a1a2a;border-radius:10px;padding:15px;margin-bottom:30px}
.stat-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #2a2a3a}
.stat-item:last-child{border-bottom:none}
.stat-item i{width:24px;color:#00d4ff}
.stat-item span{font-size:18px;font-weight:bold;margin-left:auto}
.stat-item small{font-size:11px;color:#888;margin-left:5px}
.menu{flex:1}
.menu-item{padding:12px 15px;border-radius:8px;cursor:pointer;transition:0.3s;display:flex;align-items:center;gap:12px;color:#aaa}
.menu-item:hover,.menu-item.active{background:#1a1a2a;color:#00d4ff}
.menu-item.active{border-left:3px solid #00d4ff}
.main{flex:1;display:flex;flex-direction:column;background:#0f0f18}
.header{padding:20px 30px;border-bottom:1px solid #1a1a2a;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;color:#fff}
.header button{background:#1a1a2a;border:none;color:#aaa;padding:8px 15px;border-radius:6px;cursor:pointer}
.content{flex:1;padding:20px 30px;overflow-y:auto}
.tab-content{display:none}
.tab-content.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
.stat-card{background:#1a1a2a;padding:20px;border-radius:10px;display:flex;align-items:center;gap:15px}
.stat-card i{font-size:30px;color:#00d4ff}
.stat-card div span{font-size:28px;font-weight:bold;display:block}
.stat-card div small{color:#888}
.chart-container{background:#1a1a2a;padding:20px;border-radius:10px;height:300px}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.toolbar input,.toolbar select{background:#1a1a2a;border:1px solid #2a2a3a;color:#e0e0e0;padding:10px 15px;border-radius:6px;flex:1;min-width:150px}
.toolbar button{background:#00d4ff;color:#000;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold}
.bot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.bot-card{background:#1a1a2a;padding:20px;border-radius:10px;border-left:4px solid #2a2a3a}
.bot-card.online{border-left-color:#00ff88}
.bot-card.offline{border-left-color:#ff4444}
.bot-card .name{font-size:18px;font-weight:bold;display:flex;justify-content:space-between}
.bot-card .status{font-size:12px;padding:3px 10px;border-radius:20px}
.bot-card .status.on{background:#00ff8822;color:#00ff88}
.bot-card .status.off{background:#ff444422;color:#ff4444}
.bot-card .actions{margin-top:15px;display:flex;gap:8px;flex-wrap:wrap}
.bot-card .actions button{background:#2a2a3a;border:none;color:#aaa;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.bot-card .actions button:hover{background:#3a3a4a;color:#fff}
.bot-card .actions button.danger:hover{background:#ff4444;color:#fff}
.editor-toolbar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center}
.editor-toolbar select,.editor-toolbar input,.editor-toolbar button{background:#1a1a2a;border:1px solid #2a2a3a;color:#e0e0e0;padding:8px 15px;border-radius:6px;cursor:pointer}
.editor-toolbar button{background:#00d4ff;color:#000;border:none;font-weight:bold}
.editor-toolbar input{flex:1;min-width:150px}
.editor-container{display:flex;gap:15px;height:400px}
#codeEditor{flex:1;background:#0a0a12;border:1px solid #1a1a2a;color:#e0e0e0;padding:15px;font-family:'Courier New',monospace;font-size:14px;resize:none;border-radius:6px}
#codePreview{flex:1;background:#0a0a12;border:1px solid #1a1a2a;border-radius:6px;overflow:auto;padding:15px}
.output-container{margin-top:15px;background:#0a0a12;border:1px solid #1a1a2a;border-radius:6px;padding:15px;min-height:80px;font-family:'Courier New',monospace;font-size:13px;max-height:200px;overflow-y:auto}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.7)}
.modal-content{background:#1a1a2a;margin:5% auto;padding:30px;width:90%;max-width:500px;border-radius:12px}
.modal-content input,.modal-content select{width:100%;margin:10px 0;padding:10px;background:#0a0a12;border:1px solid #2a2a3a;color:#e0e0e0;border-radius:6px}
.modal-content button{background:#00d4ff;color:#000;border:none;padding:10px;border-radius:6px;cursor:pointer;font-weight:bold;width:100%}
.close{float:right;font-size:28px;cursor:pointer;color:#888}
.close:hover{color:#fff}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0a0a12}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px}</style>
<body>
    <div id="loginModal" class="modal" style="display:block;">
        <div class="modal-content" style="max-width:400px;margin:10% auto;">
            <h2>🔐 Login</h2>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="login()">Login</button>
            <p style="margin-top:10px;text-align:center;color:#888;">Register: /api/register</p>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <div class="logo"><i class="fas fa-robot"></i><span>BotManager</span></div>
            <div class="stats-box">
                <div class="stat-item"><i class="fas fa-robot"></i><span id="totalBots">0</span><small>Bots</small></div>
                <div class="stat-item"><i class="fas fa-wifi"></i><span id="onlineBots">0</span><small>Online</small></div>
                <div class="stat-item"><i class="fas fa-user"></i><span id="currentUser">-</span><small>User</small></div>
            </div>
            <div class="menu">
                <div class="menu-item active" data-tab="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
                <div class="menu-item" data-tab="bots"><i class="fas fa-robot"></i> Bot Manager</div>
                <div class="menu-item" data-tab="editor"><i class="fas fa-code"></i> Code Editor</div>
            </div>
            <button onclick="logout()" style="margin-top:auto;background:#ff4444;color:#fff;border:none;padding:10px;border-radius:6px;cursor:pointer;">Logout</button>
        </div>
        <div class="main">
            <div class="header">
                <h1 id="pageTitle">📊 Dashboard</h1>
                <button onclick="refreshData()"><i class="fas fa-sync"></i></button>
            </div>
            <div class="content">
                <div id="tab-dashboard" class="tab-content active">
                    <div class="stats-grid">
                        <div class="stat-card"><i class="fas fa-robot"></i><div><span id="statBots">0</span><small>Total Bots</small></div></div>
                        <div class="stat-card"><i class="fas fa-wifi"></i><div><span id="statOnline">0</span><small>Online</small></div></div>
                        <div class="stat-card"><i class="fas fa-clock"></i><div><span id="statUpdate">-</span><small>Updated</small></div></div>
                    </div>
                    <div class="chart-container"><canvas id="botChart"></canvas></div>
                </div>
                <div id="tab-bots" class="tab-content">
                    <div class="toolbar">
                        <input type="text" id="botSearch" placeholder="🔍 Search...">
                        <button onclick="showCreateBot()"><i class="fas fa-plus"></i> New</button>
                    </div>
                    <div id="botList" class="bot-grid"></div>
                </div>
                <div id="tab-editor" class="tab-content">
                    <div class="editor-toolbar">
                        <select id="editorBotSelect"><option value="">Select Bot</option></select>
                        <select id="editorLanguage">
                            <option value="python">Python</option>
                            <option value="javascript">JS</option>
                            <option value="ruby">Ruby</option>
                            <option value="cpp">C++</option>
                        </select>
                        <input type="text" id="editorToken" placeholder="🔑 Bot Token">
                        <button onclick="loadCode()"><i class="fas fa-folder-open"></i></button>
                        <button onclick="saveCode()"><i class="fas fa-save"></i></button>
                        <button onclick="runCode()"><i class="fas fa-play"></i></button>
                    </div>
                    <div class="editor-container">
                        <textarea id="codeEditor" spellcheck="false"></textarea>
                        <div id="codePreview"></div>
                    </div>
                    <div id="codeOutput" class="output-container"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="createBotModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>🤖 New Bot</h2>
            <input type="text" id="newBotName" placeholder="Bot Name">
            <input type="text" id="newBotUsername" placeholder="Username (end _bot)">
            <input type="text" id="newBotToken" placeholder="🔑 Token (optional)">
            <select id="newBotLanguage">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="ruby">Ruby</option>
                <option value="cpp">C++</option>
            </select>
            <button onclick="createBot()"><i class="fas fa-plus"></i> Create</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
const API_BASE = 'https://jwijwijwijwijwijwijwijwijwijwijwijwijwijwijwijwijwijwijwijwijwjejirbdisidhje77u6y5eu7y5u89p0-fdwm.onrender.com';

let botChart = null;
let currentToken = localStorage.getItem('token') || '';

async function apiRequest(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (currentToken) headers['X-Token'] = currentToken;
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (res.status === 401) {
        localStorage.removeItem('token');
        currentToken = '';
        document.getElementById('loginModal').style.display = 'block';
        return null;
    }
    return res;
}

async function login() {
    const username = document.getElementById('loginUser').value;
    const password = document.getElementById('loginPass').value;
    if (!username || !password) return alert('Enter credentials');
    try {
        const res = await fetch(`${API_BASE}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            currentToken = data.token;
            localStorage.setItem('token', data.token);
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('currentUser').textContent = data.username;
            refreshData();
        } else {
            alert('Login failed!');
        }
    } catch(e) { alert('Error: ' + e.message); }
}

async function logout() {
    await apiRequest('/api/logout', { method: 'POST' });
    localStorage.removeItem('token');
    currentToken = '';
    document.getElementById('loginModal').style.display = 'block';
    document.getElementById('currentUser').textContent = '-';
}

async function fetchStats() {
    try {
        const res = await fetch(`${API_BASE}/api/stats`);
        const stats = await res.json();
        document.getElementById('totalBots').textContent = stats.total || 0;
        document.getElementById('onlineBots').textContent = stats.online || 0;
        document.getElementById('statBots').textContent = stats.total || 0;
        document.getElementById('statOnline').textContent = stats.online || 0;
        document.getElementById('statUpdate').textContent = stats.last_update ? stats.last_update.slice(5,16) : '-';
        return stats;
    } catch(e) { console.error(e); }
}

async function fetchBots() {
    try {
        const res = await apiRequest('/api/bots');
        if (!res) return;
        const bots = await res.json();
        renderBots(bots);
        updateEditorSelect(bots);
        updateChart(bots);
        return bots;
    } catch(e) { console.error(e); }
}

function renderBots(bots) {
    const container = document.getElementById('botList');
    const search = document.getElementById('botSearch').value.toLowerCase();
    let html = '';
    for (const [name, bot] of Object.entries(bots)) {
        if (!name.toLowerCase().includes(search)) continue;
        const status = bot.status === 'on' ? 'on' : 'off';
        const statusText = bot.status === 'on' ? '🟢 Online' : '🔴 Offline';
        const token = bot.token || 'No token';
        const displayToken = token.length > 20 ? token.slice(0,10)+'...'+token.slice(-5) : token;
        html += `
            <div class="bot-card ${bot.status === 'on' ? 'online' : 'offline'}">
                <div class="name"><span>🤖 ${name}</span><span class="status ${status}">${statusText}</span></div>
                <div style="margin:6px 0;font-size:13px;color:#888;">@${bot.username}</div>
                <div style="font-size:12px;color:#666;word-break:break-all;">🔑 ${displayToken}</div>
                <div style="font-size:12px;color:#666;margin:2px 0;">📝 ${bot.language || 'python'}</div>
                <div class="actions">
                    <button onclick="toggleBot('${name}')"><i class="fas fa-power-off"></i></button>
                    <button onclick="editBotCode('${name}')"><i class="fas fa-code"></i></button>
                    <button onclick="setToken('${name}')"><i class="fas fa-key"></i></button>
                    <button class="danger" onclick="deleteBot('${name}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
    }
    container.innerHTML = html || '<div style="text-align:center;padding:40px;color:#666;">No bots</div>';
}

function updateEditorSelect(bots) {
    const sel = document.getElementById('editorBotSelect');
    const current = sel.value;
    sel.innerHTML = '<option value="">Select Bot</option>';
    for (const name of Object.keys(bots)) {
        sel.innerHTML += `<option value="${name}">${name}</option>`;
    }
    if (current) sel.value = current;
}

function updateChart(bots) {
    const ctx = document.getElementById('botChart')?.getContext('2d');
    if (!ctx) return;
    const data = { on: 0, off: 0 };
    for (const bot of Object.values(bots)) {
        if (bot.status === 'on') data.on++;
        else data.off++;
    }
    if (botChart) botChart.destroy();
    botChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Online', 'Offline'], datasets: [{ data: [data.on, data.off], backgroundColor: ['#00ff88', '#ff4444'] }] },
        options: { responsive: true, plugins: { legend: { labels: { color: '#e0e0e0' } } } }
    });
}

async function toggleBot(name) {
    if (!confirm(`Toggle ${name}?`)) return;
    await apiRequest(`/api/bots/${name}`, { method: 'POST', body: JSON.stringify({ action: 'toggle' }) });
    refreshData();
}

async function deleteBot(name) {
    if (!confirm(`Delete ${name}?`)) return;
    await apiRequest(`/api/bots/${name}`, { method: 'POST', body: JSON.stringify({ action: 'delete' }) });
    refreshData();
}

async function setToken(name) {
    const token = prompt('Enter bot token:', '');
    if (token === null) return;
    await apiRequest(`/api/token/${name}`, { method: 'POST', body: JSON.stringify({ token }) });
    refreshData();
}

function showCreateBot() {
    document.getElementById('createBotModal').style.display = 'block';
}

function closeModal() {
    document.getElementById('createBotModal').style.display = 'none';
}

async function createBot() {
    const name = document.getElementById('newBotName').value.trim();
    const username = document.getElementById('newBotUsername').value.trim() || `${name}_bot`;
    const token = document.getElementById('newBotToken').value.trim();
    const language = document.getElementById('newBotLanguage').value;
    if (!name) return alert('Enter bot name');
    await apiRequest('/api/bots', { method: 'POST', body: JSON.stringify({ name, username, token, language }) });
    closeModal();
    refreshData();
}

async function loadCode() {
    const name = document.getElementById('editorBotSelect').value;
    if (!name) return alert('Select bot');
    const res = await apiRequest(`/api/code/${name}`);
    if (!res) return;
    const data = await res.json();
    document.getElementById('codeEditor').value = data.code || '';
    document.getElementById('editorLanguage').value = data.language || 'python';
    document.getElementById('editorToken').value = data.token || '';
    highlightCode();
}

async function saveCode() {
    const name = document.getElementById('editorBotSelect').value;
    if (!name) return alert('Select bot');
    const code = document.getElementById('codeEditor').value;
    const language = document.getElementById('editorLanguage').value;
    const token = document.getElementById('editorToken').value;
    await apiRequest(`/api/code/${name}`, { method: 'POST', body: JSON.stringify({ code, language, token }) });
    alert('Saved!');
    refreshData();
}

async function runCode() {
    const name = document.getElementById('editorBotSelect').value;
    if (!name) return alert('Select bot');
    const output = document.getElementById('codeOutput');
    output.innerHTML = '⏳ Running...';
    try {
        const res = await apiRequest(`/api/run/${name}`, { method: 'POST' });
        if (!res) return;
        const data = await res.json();
        if (data.error) {
            output.innerHTML = `<span style="color:#ff4444;">❌ ${data.error}</span>`;
        } else {
            output.innerHTML = `<span style="color:#00ff88;">✅ Output:</span>\n${data.output || 'No output'}`;
        }
    } catch(e) {
        output.innerHTML = `<span style="color:#ff4444;">❌ ${e.message}</span>`;
    }
}

function editBotCode(name) {
    document.querySelector('[data-tab="editor"]').click();
    document.getElementById('editorBotSelect').value = name;
    setTimeout(loadCode, 100);
}

function highlightCode() {
    const preview = document.getElementById('codePreview');
    const code = document.getElementById('codeEditor').value;
    const lang = document.getElementById('editorLanguage').value;
    const map = { python:'python', javascript:'javascript', ruby:'ruby', cpp:'cpp' };
    preview.innerHTML = `<pre><code class="language-${map[lang] || 'plaintext'}">${code}</code></pre>`;
    hljs.highlightAll();
}

async function refreshData() {
    if (!currentToken) {
        const saved = localStorage.getItem('token');
        if (saved) {
            currentToken = saved;
            const res = await fetch(`${API_BASE}/api/verify`, { headers: { 'X-Token': saved } });
            const data = await res.json();
            if (data.valid) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('currentUser').textContent = data.username;
                await Promise.all([fetchStats(), fetchBots()]);
                return;
            }
        }
        document.getElementById('loginModal').style.display = 'block';
        return;
    }
    await Promise.all([fetchStats(), fetchBots()]);
}

document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', function() {
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById('pageTitle').textContent = {
            dashboard: '📊 Dashboard',
            bots: '🤖 Bot Manager',
            editor: '💻 Code Editor'
        }[tab] || '📊 Dashboard';
        if (tab === 'editor') highlightCode();
    });
});

document.getElementById('botSearch')?.addEventListener('input', fetchBots);
document.getElementById('codeEditor')?.addEventListener('input', highlightCode);
document.getElementById('editorLanguage')?.addEventListener('change', highlightCode);
document.querySelector('.close')?.addEventListener('click', closeModal);
window.onclick = function(event) { if (event.target.classList.contains('modal')) closeModal(); };

refreshData();
setInterval(refreshData, 15000);
</script>
</body>
  </html>
