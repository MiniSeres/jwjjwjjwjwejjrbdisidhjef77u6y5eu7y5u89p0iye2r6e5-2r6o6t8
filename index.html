<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Manager 3 Tầng</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0d1117; color:#c9d1d9; font-family:'Segoe UI',Arial; height:100vh; overflow:hidden; }
        
        /* Navbar */
        .navbar { display:flex; background:#161b22; border-bottom:2px solid #30363d; height:65px; }
        .tab { flex:1; text-align:center; padding:20px; cursor:pointer; font-weight:bold; color:#8b949e; border-bottom:3px solid transparent; transition:0.3s; font-size:16px; }
        .tab.active { color:#58a6ff; border-bottom-color:#58a6ff; background:#0d1117; }
        .tab:hover { background:#1f2937; }

        /* Content */
        .content { height:calc(100vh - 65px); overflow-y:auto; padding:25px; display:none; }
        .content.active { display:block; }

        /* Card */
        .card { background:#161b22; border-radius:10px; border:1px solid #30363d; padding:20px; margin-bottom:20px; }
        .card h3 { color:#58a6ff; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
        .card h3 .badge { font-size:12px; background:#21262d; padding:4px 12px; border-radius:20px; color:#8b949e; font-weight:normal; }

        .item { background:#0d1117; padding:12px 16px; margin:8px 0; border-radius:8px; border:1px solid #21262d; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; transition:0.2s; }
        .item:hover { border-color:#58a6ff; }
        .item .info { display:flex; align-items:center; gap:12px; flex:1; min-width:150px; }
        .item .info .icon { font-size:20px; }
        .item .info .name { font-weight:bold; color:#f0f6fc; }
        .item .info .preview { color:#8b949e; font-size:13px; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .item .actions { display:flex; gap:6px; flex-wrap:wrap; }

        .btn { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:0.2s; }
        .btn-primary { background:#238636; color:white; }
        .btn-primary:hover { background:#2ea043; }
        .btn-secondary { background:#1f6feb; color:white; }
        .btn-secondary:hover { background:#388bfd; }
        .btn-danger { background:#da3633; color:white; }
        .btn-danger:hover { background:#f85149; }
        .btn-warning { background:#d29922; color:white; }
        .btn-warning:hover { background:#e3b341; }
        .btn-outline { background:transparent; color:#8b949e; border:1px solid #30363d; }
        .btn-outline:hover { border-color:#58a6ff; color:#58a6ff; }
        .btn-add { padding:10px 24px; font-size:15px; }

        .empty { color:#8b949e; text-align:center; padding:40px; font-style:italic; }

        /* Modal */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; justify-content:center; align-items:center; }
        .modal.show { display:flex; }
        .modal-box { background:#161b22; border-radius:12px; max-width:600px; width:95%; max-height:90vh; overflow-y:auto; border:1px solid #30363d; padding:30px; }
        .modal-box h3 { color:#58a6ff; margin-bottom:20px; font-size:20px; }
        .modal-box label { display:block; color:#8b949e; font-size:13px; margin-top:12px; margin-bottom:4px; }
        .modal-box input, .modal-box textarea, .modal-box select { width:100%; padding:10px; margin:4px 0 8px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:6px; font-size:14px; font-family:monospace; }
        .modal-box textarea { min-height:120px; resize:vertical; }
        .modal-box .btn-row { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
        .modal-box select { font-family:Arial; }

        /* Chế độ view/edit */
        .mode-toggle { display:flex; gap:8px; margin-bottom:15px; }
        .mode-btn { padding:6px 16px; border:1px solid #30363d; border-radius:6px; background:transparent; color:#8b949e; cursor:pointer; transition:0.2s; }
        .mode-btn.active { background:#1f6feb; color:white; border-color:#1f6feb; }
        .mode-btn:hover { border-color:#58a6ff; color:#58a6ff; }
        .mode-btn.active:hover { color:white; }
    </style>
</head>
<body>

<!-- 3 TAB -->
<div class="navbar">
    <div class="tab active" onclick="switchTab(0)">📁 Tầng 1: File</div>
    <div class="tab" onclick="switchTab(1)">🔑 Tầng 2: Token</div>
    <div class="tab" onclick="switchTab(2)">💾 Tầng 3: Save</div>
</div>

<!-- ======== TẦNG 1: FILE ======== -->
<div id="tab0" class="content active">
    <div class="card">
        <h3>📁 Quản lý File Code <span class="badge" id="fileCount">0 file</span></h3>
        <button class="btn btn-secondary btn-add" onclick="openModal('file')">➕ Thêm File</button>
        <div id="fileList" style="margin-top:15px;"></div>
    </div>
    <div class="card">
        <h3>✏️ Xem / Sửa File</h3>
        <div class="mode-toggle">
            <button class="mode-btn active" id="viewMode" onclick="setMode('view')">👁️ Xem</button>
            <button class="mode-btn" id="editMode" onclick="setMode('edit')">✏️ Sửa</button>
        </div>
        <select id="fileSelector" style="width:100%;padding:10px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;margin-bottom:10px;" onchange="loadFileContent()">
            <option value="">-- Chọn file --</option>
        </select>
        <div id="fileContentDisplay" style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:15px;min-height:150px;max-height:400px;overflow:auto;white-space:pre-wrap;font-family:monospace;font-size:13px;color:#c9d1d9;"></div>
        <div id="fileContentEdit" style="display:none;">
            <textarea id="fileContentTextarea" rows="8" style="width:100%;padding:10px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;font-family:monospace;font-size:13px;min-height:200px;"></textarea>
            <button class="btn btn-primary" onclick="saveFileContent()" style="margin-top:10px;">💾 Lưu thay đổi</button>
        </div>
    </div>
</div>

<!-- ======== TẦNG 2: TOKEN ======== -->
<div id="tab1" class="content">
    <div class="card">
        <h3>🔑 Quản lý Token <span class="badge" id="tokenCount">0 token</span></h3>
        <button class="btn btn-secondary btn-add" onclick="openModal('token')">➕ Thêm Token</button>
        <div id="tokenList" style="margin-top:15px;"></div>
    </div>
</div>

<!-- ======== TẦNG 3: SAVE ======== -->
<div id="tab2" class="content">
    <div class="card">
        <h3>💾 Quản lý Save (Cấu hình) <span class="badge" id="saveCount">0 save</span></h3>
        <button class="btn btn-secondary btn-add" onclick="openModal('save')">➕ Thêm Save</button>
        <div id="saveList" style="margin-top:15px;"></div>
    </div>
</div>

<!-- ======== MODAL ======== -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">Thêm mới</h3>
        <div id="modalBody"></div>
        <div class="btn-row">
            <button class="btn btn-danger" onclick="closeModal()">Hủy</button>
            <button class="btn btn-primary" onclick="submitModal()">✅ Xác nhận</button>
        </div>
    </div>
</div>

<script>
// ========== DATA ==========
let files = JSON.parse(localStorage.getItem('files3t')) || [];
let tokens = JSON.parse(localStorage.getItem('tokens3t')) || [];
let saves = JSON.parse(localStorage.getItem('saves3t')) || [];
let modalType = null;
let modalIndex = null;
let currentMode = 'view'; // 'view' hoặc 'edit'

// ========== RENDER ==========
function renderAll() {
    renderFiles();
    renderTokens();
    renderSaves();
    updateSelector();
    document.getElementById('fileCount').textContent = files.length + ' file';
    document.getElementById('tokenCount').textContent = tokens.length + ' token';
    document.getElementById('saveCount').textContent = saves.length + ' save';
}

function renderFiles() {
    const container = document.getElementById('fileList');
    if (!files.length) {
        container.innerHTML = '<div class="empty">📭 Chưa có file nào. Nhấn "+ Thêm File" nhé!</div>';
        return;
    }
    container.innerHTML = files.map((f, i) => `
        <div class="item">
            <div class="info">
                <span class="icon">📄</span>
                <span class="name">${f.name}</span>
                <span class="preview">${f.content ? f.content.substring(0, 60) + (f.content.length > 60 ? '...' : '') : 'Trống'}</span>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="selectFile(${i})">📂 Mở</button>
                <button class="btn btn-warning" onclick="openModal('file', ${i})">✏️ Sửa</button>
                <button class="btn btn-danger" onclick="deleteFile(${i})">🗑️</button>
            </div>
        </div>
    `).join('');
}

function renderTokens() {
    const container = document.getElementById('tokenList');
    if (!tokens.length) {
        container.innerHTML = '<div class="empty">🔑 Chưa có token nào. Nhấn "+ Thêm Token" nhé!</div>';
        return;
    }
    container.innerHTML = tokens.map((t, i) => `
        <div class="item">
            <div class="info">
                <span class="icon">🔑</span>
                <span class="name">Token ${i+1}</span>
                <span class="preview">${t.value.substring(0, 15)}...${t.value.substring(t.value.length - 6)}</span>
            </div>
            <div class="actions">
                <button class="btn btn-warning" onclick="openModal('token', ${i})">✏️ Sửa</button>
                <button class="btn btn-danger" onclick="deleteToken(${i})">🗑️</button>
            </div>
        </div>
    `).join('');
}

function renderSaves() {
    const container = document.getElementById('saveList');
    if (!saves.length) {
        container.innerHTML = '<div class="empty">💾 Chưa có save nào. Nhấn "+ Thêm Save" nhé!</div>';
        return;
    }
    container.innerHTML = saves.map((s, i) => {
        const file = files.find(f => f.name === s.file);
        const token = tokens.find(t => t.value === s.token);
        return `
            <div class="item">
                <div class="info">
                    <span class="icon">💾</span>
                    <span class="name">${s.name}</span>
                    <span class="preview">📁 ${s.file || 'Chưa chọn'} | 🔑 ${token ? 'Đã gắn' : 'Chưa gắn'}</span>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="runSave(${i})">▶️ Chạy</button>
                    <button class="btn btn-warning" onclick="openModal('save', ${i})">✏️ Sửa</button>
                    <button class="btn btn-danger" onclick="deleteSave(${i})">🗑️</button>
                </div>
            </div>
        `;
    }).join('');
}

function updateSelector() {
    const sel = document.getElementById('fileSelector');
    const current = sel.value;
    sel.innerHTML = '<option value="">-- Chọn file --</option>' + 
        files.map(f => `<option value="${f.name}">${f.name}</option>`).join('');
    if (files.find(f => f.name === current)) sel.value = current;
}

function loadFileContent() {
    const name = document.getElementById('fileSelector').value;
    const file = files.find(f => f.name === name);
    const display = document.getElementById('fileContentDisplay');
    const edit = document.getElementById('fileContentTextarea');
    if (file) {
        display.textContent = file.content || '(File trống)';
        edit.value = file.content || '';
    } else {
        display.textContent = 'Chọn một file để xem nội dung.';
        edit.value = '';
    }
}

function selectFile(index) {
    const file = files[index];
    if (!file) return;
    document.getElementById('fileSelector').value = file.name;
    loadFileContent();
}

function saveFileContent() {
    const name = document.getElementById('fileSelector').value;
    if (!name) return alert('Chọn file trước!');
    const content = document.getElementById('fileContentTextarea').value;
    const file = files.find(f => f.name === name);
    if (file) {
        file.content = content;
        localStorage.setItem('files3t', JSON.stringify(files));
        renderAll();
        loadFileContent();
        alert('✅ Đã lưu file!');
    }
}

function setMode(mode) {
    currentMode = mode;
    document.getElementById('viewMode').classList.toggle('active', mode === 'view');
    document.getElementById('editMode').classList.toggle('active', mode === 'edit');
    document.getElementById('fileContentDisplay').style.display = mode === 'view' ? 'block' : 'none';
    document.getElementById('fileContentEdit').style.display = mode === 'edit' ? 'block' : 'none';
    loadFileContent();
}

// ========== MODAL ==========
function openModal(type, index = null) {
    modalType = type;
    modalIndex = index;
    const modal = document.getElementById('modal');
    const title = document.getElementById('modalTitle');
    const body = document.getElementById('modalBody');

    if (type === 'file') {
        title.textContent = index !== null ? '✏️ Sửa File' : '📁 Thêm File mới';
        const data = index !== null ? files[index] : { name: '', content: '' };
        body.innerHTML = `
            <label>Tên file (VD: bot.py, index.js, main.go)</label>
            <input id="modalName" value="${data.name}" placeholder="Nhập tên file...">
            <label>Nội dung code</label>
            <textarea id="modalContent" rows="8" placeholder="Dán code vào đây...">${data.content || ''}</textarea>
        `;
    } else if (type === 'token') {
        title.textContent = index !== null ? '✏️ Sửa Token' : '🔑 Thêm Token mới';
        const data = index !== null ? tokens[index] : { value: '' };
        body.innerHTML = `
            <label>Token Discord / Telegram</label>
            <input id="modalValue" value="${data.value || ''}" placeholder="Dán token vào đây...">
        `;
    } else if (type === 'save') {
        title.textContent = index !== null ? '✏️ Sửa Save' : '💾 Thêm Save mới';
        const data = index !== null ? saves[index] : { name: '', file: '', token: '' };
        body.innerHTML = `
            <label>Tên Save</label>
            <input id="modalName" value="${data.name || ''}" placeholder="VD: Config Bot 1">
            <label>Chọn File (code để chạy)</label>
            <select id="modalFile">
                <option value="">-- Chọn file --</option>
                ${files.map(f => `<option value="${f.name}" ${f.name === data.file ? 'selected' : ''}>${f.name}</option>`).join('')}
            </select>
            <label>Chọn Token</label>
            <select id="modalToken">
                <option value="">-- Chọn token --</option>
                ${tokens.map((t, i) => `<option value="${t.value}" ${t.value === data.token ? 'selected' : ''}>Token ${i+1}</option>`).join('')}
            </select>
        `;
    }
    modal.classList.add('show');
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

function submitModal() {
    if (modalType === 'file') {
        const name = document.getElementById('modalName').value.trim();
        const content = document.getElementById('modalContent').value;
        if (!name) return alert('Nhập tên file!');
        if (modalIndex !== null) {
            files[modalIndex] = { name, content };
        } else {
            if (files.find(f => f.name === name)) return alert('File đã tồn tại!');
            files.push({ name, content });
        }
    } else if (modalType === 'token') {
        const value = document.getElementById('modalValue').value.trim();
        if (!value) return alert('Nhập token!');
        if (modalIndex !== null) {
            tokens[modalIndex] = { value };
        } else {
            tokens.push({ value });
        }
    } else if (modalType === 'save') {
        const name = document.getElementById('modalName').value.trim();
        const file = document.getElementById('modalFile').value;
        const token = document.getElementById('modalToken').value;
        if (!name) return alert('Nhập tên save!');
        if (modalIndex !== null) {
            saves[modalIndex] = { name, file, token };
        } else {
            saves.push({ name, file, token });
        }
    }

    localStorage.setItem('files3t', JSON.stringify(files));
    localStorage.setItem('tokens3t', JSON.stringify(tokens));
    localStorage.setItem('saves3t', JSON.stringify(saves));
    closeModal();
    renderAll();
    // Nếu đang ở tab file, load lại selector
    if (document.getElementById('tab0').classList.contains('active')) {
        loadFileContent();
    }
}

// ========== DELETE ==========
function deleteFile(i) { if (confirm('Xóa file này?')) { files.splice(i,1); localStorage.setItem('files3t',JSON.stringify(files)); renderAll(); } }
function deleteToken(i) { if (confirm('Xóa token này?')) { tokens.splice(i,1); localStorage.setItem('tokens3t',JSON.stringify(tokens)); renderAll(); } }
function deleteSave(i) { if (confirm('Xóa save này?')) { saves.splice(i,1); localStorage.setItem('saves3t',JSON.stringify(saves)); renderAll(); } }

// ========== RUN SAVE ==========
function runSave(index) {
    const save = saves[index];
    if (!save) return;
    const file = files.find(f => f.name === save.file);
    const token = tokens.find(t => t.value === save.token);
    if (!file) return alert('❌ Không tìm thấy file!');
    if (!token) return alert('❌ Không tìm thấy token!');
    
    alert(`▶️ Đang chạy bot:\n📁 ${file.name}\n🔑 ${token.value.substring(0,15)}...\n\n(Lưu ý: Cần có backend để chạy thực tế)`);
    // Tui sẽ thêm phần gửi sang Termux sau nếu bro cần
}

// ========== TAB SWITCH ==========
function switchTab(index) {
    document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', i === index));
    document.querySelectorAll('.content').forEach((el, i) => el.classList.toggle('active', i === index));
    if (index === 0) loadFileContent();
}

// ========== START ==========
renderAll();
setMode('view');
</script>
</body>
  </html>
