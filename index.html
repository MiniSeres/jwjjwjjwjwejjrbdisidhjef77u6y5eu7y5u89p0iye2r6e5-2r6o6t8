<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Code Pro</title><link rel="stylesheet" href="style.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script></head>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}body{background:#0d1117;color:#c9d1d9}#login{display:flex;height:100vh;justify-content:center;align-items:center}#login>div{background:#161b22;padding:40px;border-radius:20px;text-align:center;border:1px solid #30363d}#login h1{font-size:2rem;background:linear-gradient(90deg,#58a6ff,#f0883e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#login button{display:block;width:100%;padding:14px;margin:10px 0;border:0;border-radius:10px;font-size:1rem;cursor:pointer}.g{background:#5865f2;color:#fff}.r{background:#238636;color:#fff}#app{display:none;height:100vh}#side{width:200px;background:#161b22;border-right:1px solid #30363d;padding:10px;float:left;height:100%;overflow-y:auto}#side h3{font-size:.9rem;display:flex;justify-content:space-between}#side h3 button{background:#238636;color:#fff;border:0;padding:2px 12px;border-radius:4px;cursor:pointer}#list{padding:5px 0}.item{padding:6px 8px;margin:3px 0;background:#0d1117;border-radius:4px;display:flex;justify-content:space-between;font-size:.8rem;cursor:pointer}.item button{background:0;border:0;color:#8b949e;cursor:pointer}#main{margin-left:200px;height:100vh;display:flex;flex-direction:column}#bar{background:#161b22;padding:6px 12px;border-bottom:1px solid #30363d;display:flex;flex-wrap:wrap;gap:5px;align-items:center;font-size:.8rem}#bar button{background:#1f6feb;color:#fff;border:0;padding:3px 12px;border-radius:4px;cursor:pointer}#bar .t{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:3px 10px;border-radius:4px;cursor:pointer}#ed{display:flex;flex:1}#code{flex:1;height:100%}#right{width:250px;background:#161b22;border-left:1px solid #30363d;padding:10px;overflow-y:auto;font-size:.8rem}#right p{margin:3px 0}#right iframe{width:100%;height:150px;border:0;background:#fff;border-radius:4px}#lo{width:100%;padding:8px;background:#da3633;color:#fff;border:0;border-radius:6px;cursor:pointer;margin-top:10px}</style>
<body>
<div id="login"><div><h1>🚀 Code Pro</h1><p>Chỉ chủ nhân!</p><button class="g" onclick="login()">🔑 Google</button><button class="r" onclick="register()">➕ Tạo</button></div></div>
<div id="app"><div id="side"><h3>📁 Saves <button onclick="newSave()">+</button></h3><div id="list"></div><button onclick="logout()" id="lo">🚪 Thoát</button></div>
<div id="main"><div id="bar"><span id="name">Chọn Save</span><button onclick="rename()">✏️</button><button onclick="del()">🗑️</button><button onclick="viewAll()">📋</button><button onclick="addFile()">+ File</button><span>🔑<span id="token">OFF</span></span><button class="t" onclick="toggleToken()">⚡</button><button class="t" onclick="toggle247()">🕐</button><select id="timer" onchange="setTimer(this.value)"><option value="0">⏱️</option><option value="1">1p</option><option value="5">5p</option><option value="15">15p</option><option value="30">30p</option><option value="60">1h</option><option value="360">6h</option><option value="720">12h</option><option value="1440">24h</option></select></div>
<div id="ed"><div id="code"></div><div id="right"><p>📊 Dòng:<span id="lines">0</span></p><p>📝 Ký tự:<span id="chars">0</span></p><p>⏱️<span id="time">00:00:00</span></p><h4>👁️ Preview</h4><iframe id="preview"></iframe></div></div></div></div>
<script src="script.js"></script>
</body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
