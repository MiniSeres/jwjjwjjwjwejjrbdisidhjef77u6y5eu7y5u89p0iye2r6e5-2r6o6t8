<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Code Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#0d1117;color:#c9d1d9;height:100vh;overflow:hidden}
#login{display:flex;height:100vh;justify-content:center;align-items:center}
#login>div{background:#161b22;padding:40px;border-radius:20px;text-align:center;border:1px solid #30363d;max-width:400px;width:90%}
#login h1{font-size:2rem;margin-bottom:10px;background:linear-gradient(90deg,#58a6ff,#f0883e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#login button{display:block;width:100%;padding:14px;margin:10px 0;border:0;border-radius:10px;font-size:1rem;cursor:pointer}
#login .g{background:#5865f2;color:#fff}
#login .r{background:#238636;color:#fff}
#app{display:none;height:100vh}
#top{height:40px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
#top select,#top button{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:4px 10px;border-radius:4px;font-size:13px;cursor:pointer}
#top button{background:#21262d}
#top .on{background:#238636;color:#fff;border-color:#238636}
#mid{display:flex;height:calc(100vh - 40px)}
#left{width:200px;background:#161b22;border-right:1px solid #30363d;padding:8px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
#left h3{font-size:14px;display:flex;justify-content:space-between;margin-bottom:8px}
#left h3 button{background:#238636;color:#fff;border:0;border-radius:4px;padding:0 12px;cursor:pointer}
#fileList{flex:1;overflow-y:auto}
#fileList div{padding:5px 8px;margin:2px 0;background:#0d1117;border-radius:4px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between}
#fileList div:hover{background:#21262d}
#fileList .act{background:#1f6feb}
#left button{width:100%;padding:6px;background:#da3633;color:#fff;border:0;border-radius:4px;cursor:pointer;margin-top:8px}
#right{flex:1;display:flex;flex-direction:column}
#editor{flex:1;height:100%}
#panel{width:260px;background:#161b22;border-left:1px solid #30363d;padding:10px;overflow-y:auto;flex-shrink:0;font-size:13px}
#panel p{margin:4px 0}
#panel iframe{width:100%;height:160px;border:0;background:#fff;border-radius:4px;margin-top:6px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>
</head>
<body>

<div id="login"><div>
<h1>🚀 Code Pro</h1>
<p style="color:#8b949e;margin:10px 0">Chỉ dành cho chủ nhân!</p>
<button class="g" onclick="login()">🔑 Đăng nhập Google</button>
<button class="r" onclick="register()">➕ Tạo tài khoản</button>
</div></div>

<div id="app">
<div id="top">
<select id="saveSelect" onchange="loadSave(this.value)"><option value="">📁 Chọn Save</option></select>
<button onclick="newSave()">+ Save</button>
<button onclick="renameSave()">✏️</button>
<button onclick="delSave()">🗑️</button>
<button onclick="addFile()">+ File</button>
<button id="tokenBtn" onclick="toggleToken()">⚡ OFF</button>
<button id="activeBtn" onclick="toggleActive()">🕐 24/7</button>
<select id="timerSelect" onchange="setTimer(this.value)"><option value="0">⏱️ Timer</option><option value="1">1p</option><option value="5">5p</option><option value="15">15p</option><option value="30">30p</option><option value="60">1h</option><option value="360">6h</option><option value="720">12h</option><option value="1440">24h</option></select>
</div>
<div id="mid">
<div id="left">
<h3>📄 Files <button onclick="addFile()">+</button></h3>
<div id="fileList"></div>
<button onclick="logout()">🚪 Thoát</button>
</div>
<div id="right">
<div id="editor"></div>
</div>
<div id="panel">
<p>📊 Dòng: <span id="lines">0</span></p>
<p>📝 Ký tự: <span id="chars">0</span></p>
<p>⏱️ <span id="time">00:00:00</span></p>
<hr style="border-color:#30363d;margin:8px 0">
<h4>👁️ Preview</h4>
<iframe id="preview"></iframe>
</div>
</div>
</div>

<script src="script.js"></script>
</body>
  </html>
